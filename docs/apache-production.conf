# ============================================
# APACHE CONFIGURATION FOR PAREEDUHUB.COM
# File: /etc/apache2/sites-available/pareeduhub.com.conf
# ============================================

# HTTP to HTTPS Redirect
<VirtualHost *:80>
    ServerName pareeduhub.com
    ServerAlias www.pareeduhub.com

    Redirect permanent / https://pareeduhub.com/
</VirtualHost>

# HTTPS Configuration
<VirtualHost *:443>
    ServerName pareeduhub.com
    ServerAlias www.pareeduhub.com

    DocumentRoot /var/www/pareeduhub.com/public

    # SSL Configuration (Let's Encrypt)
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/pareeduhub.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/pareeduhub.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    # Directory Configuration
    <Directory /var/www/pareeduhub.com/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted

        # Laravel .htaccess will handle routing
    </Directory>

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "no-referrer-when-downgrade"

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/pareeduhub-error.log
    CustomLog ${APACHE_LOG_DIR}/pareeduhub-access.log combined

    # PHP Configuration
    php_value upload_max_filesize 100M
    php_value post_max_size 100M
    php_value max_execution_time 300
    php_value memory_limit 256M
</VirtualHost>

# Enable required Apache modules:
# sudo a2enmod rewrite ssl headers
# sudo a2ensite pareeduhub.com
# sudo systemctl reload apache2
